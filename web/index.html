<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Declare - Card Game</title>
    <style>
        html, body { margin: 0; padding: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #canvas { border: 2px solid #c9a227; border-radius: 8px; }
        #loading { color: #c9a227; font-family: sans-serif; font-size: 24px; text-align: center; }
    </style>
</head>
<body>
    <div id="loading">Loading Declare...</div>
    <canvas id="canvas"></canvas>
    <script>
        window.onload = function() {
            document.getElementById('loading').style.display = 'none';
        };
    </script>
</body>
</html>
